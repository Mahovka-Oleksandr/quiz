<!DOCTYPE html>
<html lang="uk">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Quiz Show</title>
<body>

<div class="app-container">
    <div id="start-screen" class="screen">
     <h1>Розпочати квіз</h1>
     <button id="start-btn">🚀 ПЕРЕВІРИТИ ЗНАННЯ</button>
    </div>

    <div id="quiz-screen" class="screen hide">
        <div class="header">
        <span id="timer">Час: 15</span>
        <span id="score-display">Бали: 0</span>
        </div> 
        <h2 id="question-text">Питання</h2>
        <div id="answers-container">
        </div>
    </div>

    <div id="result-screen" class="screen hide">
    <h2>Квіз завершено!</h2>
    <p id="result-text"></p> 
    <button id="restart-btn">Спробувати ще</button>
    </div>
</div>

</body>
</html>

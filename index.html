<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Quiz</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div id="start-screen" class="screen">
           <h1 class="neon-title">НЕОНОВИЙ КВІЗ ПО ГЕОГРАФІЇ</h1>

            <button id="start-btn" class="start-btn">Почати</button>
        </div>

        <div id="quiz-screen" class="screen hide">
            <div class="header">
                <span id="timer">Час: 15</span>
                <span id="score-display">Бали: 0</span>
            </div>
            <h2 id="question-text">Питання</h2>
            <div id="answers-container" class="answers-container"></div>
        </div>

        <div id="result-screen" class="screen hide">
            <h2>Фініш!</h2>
            <p id="result-text"></p>
            <button id="restart-btn">Ще раз</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
